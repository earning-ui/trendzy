
{% extends 'base.html' %}
{% block content %}

<style>
.hero {
    background: linear-gradient(135deg, #ff6f00, #ff9f40);
    color: white;
    padding: 60px 20px;
    text-align: center;
    border-radius: 12px;
}

.hero h1 {
    font-size: 40px;
    font-weight: bold;
}

.hero p {
    font-size: 18px;
}

.section-title {
    margin: 30px 0 15px;
    font-weight: bold;
}

.product-card {
    border: 1px solid #eee;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    background: #fff;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.product-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.product-body {
    padding: 10px;
}

.price {
    color: #f57224;
    font-weight: bold;
}
</style>

<div class="container mt-4">

    <!-- 🔥 HERO SECTION -->
    <div class="hero">
        <h1>Welcome to Trendzy 🛒</h1>
        <p>Best deals on electronics, gadgets & more</p>
        <a href="{% url 'product_list' %}" class="btn btn-dark mt-3">
      </a>
      
    </div>

    <!-- 🔥 FEATURED PRODUCTS -->
    <h4 class="section-title">🔥 Featured Products</h4>

    <div class="row">

        {% for product in products %}
        <div class="col-md-3 mb-4">

            <div class="product-card">

                <img src="{{ product.image.url }}" class="product-img">

                <div class="product-body">

                    <h6>{{ product.name }}</h6>

                    <p class="price">Rs {{ product.price }}</p>

                    <a href="{% url 'product_detail' product.id %}" class="btn btn-sm btn-primary w-100">
                        Order Now
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
